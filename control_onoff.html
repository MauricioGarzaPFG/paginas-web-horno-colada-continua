<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Control ON/OFF</title>

    <style>
        /* Estilo general de la página */
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        /* Botón de regreso al menú principal */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        h1 {
            margin-top: 60px;
        }

        .container {
            margin-top: 40px;
        }

        /* Estilo base para los botones ON y OFF */
        .btn {
            width: 200px;
            padding: 20px;
            margin: 20px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        /* Color verde para encendido, rojo para apagado */
        .on {
            background-color: #27ae60;
        }

        .off {
            background-color: #e74c3c;
        }

        /* Estilo del texto que muestra el estado actual */
        .estado {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="volverMenu()">← Menú</button>

<h1>Control del Sistema</h1>

<div class="container">
    <!-- Botones para enviar comandos de encendido y apagado -->
    <button class="btn on" onclick="encender()">ON</button>
    <button class="btn off" onclick="apagar()">OFF</button>

    <!-- Muestra el estado actual del horno leído desde el PLC -->
    <div class="estado">
        <!-- AWP_Out_Variable Name='"DB_Web".Estado_horno' -->
        Estado del horno:
        <span id="estadoHorno">---</span>
    </div>
</div>

<!-- IFrame oculto que recibe la respuesta del PLC sin recargar la página -->
<iframe name="oculto" style="display:none;"></iframe>

<!-- Formulario oculto para enviar el comando de encendido al PLC -->
<form id="formOn" method="post" action="On.html" target="oculto" style="display:none;">
    <input type="hidden" name='"DB_Web".Encendido' value="1">
</form>

<!-- Formulario oculto para enviar el comando de apagado al PLC -->
<form id="formOff" method="post" action="Off.html" target="oculto" style="display:none;">
    <input type="hidden" name='"DB_Web".Apagado' value="1">
</form>

<script>

    /* Índice de cada variable dentro del archivo IO.html */
    const idx = {
        Estado_horno: 11
    };

    /* Lee los valores actuales desde el PLC y actualiza la interfaz */
    async function actualizar() {
        try {
            const res = await fetch("IO.html");
            const data = await res.text();

            /* Separa cada valor en una línea independiente */
            let valores = data.trim().split(/\r?\n/);

            /* Interpreta el valor como encendido (1) o apagado (0), parseInt convierte un texto en número entero. */
            let estado = parseInt(valores[idx.Estado_horno]) === 1;

            /* Actualiza el texto y color según el estado del horno */
            if (estado) {
                document.getElementById("estadoHorno").innerText = "ENCENDIDO";
                document.getElementById("estadoHorno").style.color = "#27ae60";
            } else {
                document.getElementById("estadoHorno").innerText = "APAGADO";
                document.getElementById("estadoHorno").style.color = "#e74c3c";
            }

        } catch (e) {
            console.log("Error:", e);
        }
    }

    /* Llama a actualizar() cada 1 segundo para mantener los datos correctos*/
    setInterval(actualizar, 1000);
    actualizar();

    /* Solicita confirmación antes de enviar el comando de encendido */
    function encender() {
        let confirmacion = confirm("¿Está seguro de que desea ENCENDER el sistema?");
        if (confirmacion) {
            document.getElementById("formOn").submit();
            setTimeout(actualizar, 300);
        }
    }

    /* Solicita confirmación antes de enviar el comando de apagado */
    function apagar() {
        let confirmacion = confirm("¿Está seguro de que desea APAGAR el sistema?");
        if (confirmacion) {
            document.getElementById("formOff").submit();
            setTimeout(actualizar, 300);
        }
    }

    /* Regresa al menú principal */
    function volverMenu() {
        window.location.href = "index.html";
    }

</script>

</body>
</html>
